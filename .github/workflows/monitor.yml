name: TDLC Monitor WhatsApp

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar monitor
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CALLMEBOT_PHONE:    ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY:   ${{ secrets.CALLMEBOT_APIKEY }}
        run: python monitor.py

      - name: Subir HTML de debug
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: debug-html
          path: debug.html

      - name: Guardar hash
        run: |
          git config user.name "tdlc-bot"
          git config user.email "bot@tdlc"
          git add last_hash.txt
          git diff --cached --quiet || git commit -m "update hash"
          git push origin main || true
